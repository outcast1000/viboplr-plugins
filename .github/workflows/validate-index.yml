name: Validate index

on:
  pull_request:
    paths:
      - "index.json"
      - "recommended.json"
      - "scripts/**"
  push:
    branches: [main]
    paths:
      - "index.json"
      - "recommended.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Validate index.json structure
        run: node scripts/validate-index.mjs
      - name: Run lib unit tests
        run: node scripts/lib.test.mjs
