name: Set recommended plugins

# One-click curation from the Actions tab (no clone, works from phone):
#   Actions → "Set recommended plugins" → Run workflow → type the full list of
#   plugin IDs (comma- or space-separated) → Run.
# It rewrites recommended.json with exactly that set, syncs index.json, validates,
# and commits to main. Declarative: the list you type becomes the complete set.

on:
  workflow_dispatch:
    inputs:
      ids:
        description: "Recommended plugin IDs (comma/space separated). Empty = none recommended."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: sync-recommended
  cancel-in-progress: false

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write recommended.json from input
        env:
          IDS: ${{ github.event.inputs.ids }}
        run: node scripts/set-recommended.mjs "$IDS"

      - name: Sync index.json
        run: node scripts/sync-recommended.mjs

      - name: Validate
        run: node scripts/validate-index.mjs

      - name: Commit
        run: |
          if [ -n "$(git status --porcelain recommended.json index.json)" ]; then
            git config user.name "viboplr-gallery-bot"
            git config user.email "bot@viboplr.com"
            git add recommended.json index.json
            git commit -m "chore: set recommended plugins (${{ github.event.inputs.ids }})"
            git push
            echo "Updated recommended set and pushed."
          else
            echo "No change."
          fi
